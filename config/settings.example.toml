[app]
name = "wusaki-agent"
workspace_dir = ".wusaki"
log_level = "INFO"

[llm]
provider = "openai"
model = "gpt-5.4-mini"
api_key = ""

[memory]
enabled = true
vector_backend = "stub"

[channels.qq]
enabled = false
bot_token = ""

[channels.telegram]
enabled = false
bot_token = ""
chat_id = ""

[proactive]
enabled = false
profile = "daily"
cooldown_minutes = 120

[drift]
enabled = true
min_interval_minutes = 60

